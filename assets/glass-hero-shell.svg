<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glass hero shell">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081225"/>
      <stop offset="0.55" stop-color="#0E1C34"/>
      <stop offset="1" stop-color="#12294B"/>
    </linearGradient>
    <linearGradient id="glass" x1="100" y1="50" x2="1100" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#23C4FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="rim" x1="120" y1="68" x2="1080" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DDCFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#23C4FF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#23C4FF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <circle cx="1020" cy="66" r="120" fill="#23C4FF" opacity="0.14"/>
  <circle cx="190" cy="270" r="130" fill="#8BE6FF" opacity="0.10"/>

  <g filter="url(#glow)">
    <rect x="96" y="52" width="1008" height="216" rx="24" fill="url(#glass)"/>
    <rect x="96.7" y="52.7" width="1006.6" height="214.6" rx="23.3" stroke="url(#rim)" stroke-width="1.4"/>
  </g>

  <rect x="138" y="90" width="420" height="10" rx="5" fill="#D8F3FF" fill-opacity="0.28"/>
  <rect x="138" y="114" width="320" height="8" rx="4" fill="#D8F3FF" fill-opacity="0.18"/>
  <rect x="138" y="152" width="132" height="34" rx="17" fill="#23C4FF" fill-opacity="0.2"/>
  <rect x="284" y="152" width="132" height="34" rx="17" fill="#23C4FF" fill-opacity="0.14"/>
  <rect x="430" y="152" width="132" height="34" rx="17" fill="#23C4FF" fill-opacity="0.11"/>
  <rect x="710" y="102" width="320" height="130" rx="18" fill="#0F203D" fill-opacity="0.72"/>
  <rect x="726" y="122" width="128" height="12" rx="6" fill="#89E5FF" fill-opacity="0.4"/>
  <rect x="726" y="146" width="280" height="8" rx="4" fill="#89E5FF" fill-opacity="0.24"/>
  <rect x="726" y="166" width="240" height="8" rx="4" fill="#89E5FF" fill-opacity="0.2"/>
  <rect x="726" y="186" width="200" height="8" rx="4" fill="#89E5FF" fill-opacity="0.16"/>
