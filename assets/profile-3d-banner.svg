<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pseudo 3D backend systems banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111A2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="80" x2="980" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23C4FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7AF0B5" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18253A"/>
      <stop offset="1" stop-color="#0F1A2D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity="0.24" flood-color="#23C4FF"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="22" fill="url(#bg)"/>
  <ellipse cx="950" cy="40" rx="220" ry="70" fill="#23C4FF" opacity="0.10"/>
  <ellipse cx="250" cy="280" rx="220" ry="70" fill="#7AF0B5" opacity="0.08"/>
  <rect x="120" y="56" width="960" height="208" rx="26" fill="url(#accent)" opacity="0.85"/>

  <g filter="url(#soft)">
    <polygon points="240,190 360,130 480,190 360,250" fill="url(#node)" stroke="#23C4FF" stroke-opacity="0.55"/>
    <polygon points="540,175 670,110 800,175 670,240" fill="url(#node)" stroke="#7AF0B5" stroke-opacity="0.55"/>
    <polygon points="850,188 935,146 1020,188 935,230" fill="url(#node)" stroke="#FFC857" stroke-opacity="0.6"/>
  </g>

  <line x1="430" y1="190" x2="580" y2="175" stroke="#23C4FF" stroke-width="2" stroke-dasharray="6 6" opacity="0.7"/>
  <line x1="760" y1="175" x2="870" y2="188" stroke="#7AF0B5" stroke-width="2" stroke-dasharray="6 6" opacity="0.7"/>

  <text x="120" y="118" fill="#EAF2FF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Backend Systems • API Design • Data Integrity</text>
  <text x="120" y="154" fill="#9FB2CC" font-family="Segoe UI, Arial, sans-serif" font-size="17">Pseudo-3D visual identity rendered with lightweight SVG for GitHub-safe display</text>
</svg>
